<div class="register-container">
  <h2>Registrar</h2>
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">E-mail</label>
      <input
        type="email"
        id="email"
        formControlName="email"
        [ngClass]="{ 'is-invalid': submitted && f['email'].invalid }"
      />
      <div *ngIf="submitted && f['email'].invalid" class="invalid-feedback">
        <div *ngIf="f['email'].errors?.['required']">E-mail é obrigatório.</div>
        <div *ngIf="f['email'].errors?.['email']">E-mail inválido.</div>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Senha</label>
      <input
        type="password"
        id="password"
        formControlName="password"
        [ngClass]="{ 'is-invalid': submitted && f['password'].invalid }"
      />
      <div *ngIf="submitted && f['password'].invalid" class="invalid-feedback">
        <div *ngIf="f['password'].errors?.['required']">Senha é obrigatória.</div>
        <div *ngIf="f['password'].errors?.['minlength']">
          A senha deve ter pelo menos 6 caracteres.
        </div>
      </div>
    </div>

    <button type="submit" [disabled]="loading">Registrar</button>

    <div *ngIf="error" class="error-message">
      {{ error }}
    </div>
  </form>
  <p>
    Já tem uma conta?
    <a routerLink="/auth/login">Faça login aqui</a>
  </p>
</div>
